name: Release

on:
  push:
    tags:
      - 'release_*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build
        run: node build.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/aiTemplateLab.html
          name: ${{ github.ref_name }}
          body: |
            ## aiTemplateLab ${{ github.ref_name }}

            Download `aiTemplateLab.html` below and open it in any modern browser — no installation required.
