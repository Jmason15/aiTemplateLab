<!-- Tile context menu — shared, positioned by JS, lives outside sidebar so it can overflow -->
<div id="tile-context-menu" style="display:none; position:fixed; z-index:10000;">
    <button id="tile-menu-move">Move to Group</button>
    <button id="tile-menu-rename">Rename</button>
    <button id="tile-menu-delete" class="tile-menu-delete">Delete</button>
</div>

<div id="sidebar" class="sidebar">
    <div class="templates-container template-list-card">
        <div id="prompts-list">
            <!-- Prompt tiles rendered by JS -->
        </div>
    </div>
    <div class="sidebar-footer">
        <div class="sidebar-actions sidebar-actions-bottom" style="padding:1em 1em 1.2em 1em;">
            <button class="btn btn-outline btn-block" id="import-json-btn" style="border-radius:8px; font-weight:500;">Import JSON</button>
            <button class="btn btn-success btn-block" id="blank-prompt-btn" style="margin-top: 0.5rem; border-radius:8px; font-weight:500;">Blank Prompt</button>
        </div>

        <!-- Hidden buttons used by workspace/group save-load logic -->
        <button id="save-workspace-btn" style="display:none;">Save Workspace</button>
        <button id="load-workspace-btn" style="display:none;">Load Workspace</button>
        <button id="save-template-group-btn" style="display:none;">Save Template Group</button>
        <button id="load-template-group-btn" style="display:none;">Load Template Group</button>
        <button id="create-template-group-btn" style="display:none;">Create Template Group</button>
    </div>
</div>
