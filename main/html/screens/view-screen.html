<section id="view-screen" class="screen" aria-labelledby="view-name">
    <div class="view-screen">
        <div class="view-left">
            <div class="section card card-body" style="margin-bottom: 1.5rem;">
                <h4 style="margin-top:0; color: var(--color-primary);">Inputs</h4>
                <div id="view-inputs"></div>
            </div>
        </div>
        <div class="view-right">
            <div class="btn-group" style="gap: 0.75rem; align-items: center;">
                <button class="btn btn-primary" type="button" id="copy-view-output" aria-label="Copy prompt to clipboard">
                    Create Prompt
                </button>
            </div>
        </div>
    </div>
</section>
