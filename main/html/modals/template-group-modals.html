<!-- Rename Template Modal -->
<div id="rename-template-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:2rem;">
    <div style="background:#fff; border-radius:8px; padding:2rem; max-width:480px; width:100%; display:flex; flex-direction:column;">
        <h2 style="margin-bottom:1.2rem; color:#2563eb;">Rename Template</h2>
        <label for="rename-template-input">New Name:</label>
        <input type="text" id="rename-template-input" placeholder="Template name" style="margin-bottom:1rem;">
        <div id="rename-template-error" style="color:#ef4444; margin-bottom:1rem; display:none;"></div>
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button class="btn btn-primary" id="rename-template-confirm">Rename</button>
            <button class="btn btn-secondary" id="rename-template-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Move Template to Group Modal -->
<div id="move-template-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:2rem;">
    <div style="background:#fff; border-radius:8px; padding:2rem; max-width:480px; width:100%; display:flex; flex-direction:column;">
        <h2 style="margin-bottom:0.5rem; color:#2563eb;">Move to Group</h2>
        <p id="move-template-name" style="margin-bottom:1.2rem; color:#64748b; font-size:1em;"></p>
        <label for="move-template-group-select">Destination Group:</label>
        <select id="move-template-group-select" style="margin-bottom:1rem;"></select>
        <div id="move-template-new-group-row" style="display:none; flex-direction:column; margin-bottom:1rem;">
            <label for="move-template-new-group-name">New Group Name:</label>
            <input type="text" id="move-template-new-group-name" placeholder="e.g., Marketing" style="margin-top:0.3rem;">
        </div>
        <div id="move-template-error" style="color:#ef4444; margin-bottom:1rem; display:none;"></div>
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button class="btn btn-primary" id="move-template-confirm">Move</button>
            <button class="btn btn-secondary" id="move-template-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Create Template Group Modal -->
<div id="create-template-group-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:2rem;">
    <div style="background:#fff; border-radius:8px; padding:2rem; max-width:600px; max-height:80vh; display:flex; flex-direction:column;">
        <h2 style="margin-bottom:1rem; color:#2563eb;">Create Template Group</h2>
        <label for="create-template-group-name">Template Group Name:</label>
        <input type="text" id="create-template-group-name" placeholder="e.g., New Group" style="margin-bottom:1rem;">
        <div id="create-template-group-error" style="color:#ef4444; margin-bottom:1rem; display:none;"></div>
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button class="btn btn-success" id="create-template-group-confirm">Create</button>
            <button class="btn btn-secondary" id="create-template-group-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Save Template Group Modal -->
<div id="save-template-group-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:2rem;">
    <div style="background:#fff; border-radius:8px; padding:2rem; max-width:600px; max-height:80vh; display:flex; flex-direction:column;">
        <h2 style="margin-bottom:1rem; color:#2563eb;">Save Template Group</h2>
        <label for="save-template-group-select">Template Group:</label>
        <select id="save-template-group-select" style="margin-bottom:1rem;"></select>
        <label for="save-template-group-filename">File Name:</label>
        <input type="text" id="save-template-group-filename" placeholder="e.g., template-group.json" style="margin-bottom:1rem;">
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button class="btn btn-success" id="save-template-group-confirm">Save</button>
            <button class="btn btn-secondary" id="save-template-group-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Delete Template Group Modal -->
<div id="delete-template-group-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; padding:2rem;">
    <div style="background:#fff; border-radius:8px; padding:2rem; max-width:600px; max-height:80vh; display:flex; flex-direction:column;">
        <h2 style="margin-bottom:1rem; color:#ef4444;">Delete Template Group</h2>
        <label for="delete-template-group-select">Select Template Group to Delete:</label>
        <select id="delete-template-group-select" style="margin-bottom:1rem;"></select>
        <div id="delete-template-group-error" style="color:#ef4444; margin-bottom:1rem; display:none;"></div>
        <div style="display:flex; gap:1rem; margin-top:1rem;">
            <button class="btn btn-danger" id="delete-template-group-confirm">Delete</button>
            <button class="btn btn-secondary" id="delete-template-group-cancel">Cancel</button>
        </div>
    </div>
</div>
