<!-- Import Modal -->
<div id="new-prompt-modal" tabindex="-1" aria-modal="true" role="dialog">
    <div id="new-prompt-modal-content">
        <h2 class="modal-title">Import</h2>

        <div class="uim-dropzone" id="uim-dropzone">
            <svg class="uim-dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
            <p class="uim-dropzone-text">Drop a JSON file here</p>
            <p class="uim-dropzone-or">or</p>
            <button type="button" class="btn btn-secondary" id="uim-pick-file-btn">Browse Files</button>
            <input type="file" id="uim-file-input" accept=".json" style="display:none;">
        </div>

        <div id="uim-file-preview" style="display:none;">
            <div id="uim-detected-msg" class="uim-detected-msg"></div>
            <div id="uim-file-group-fields" style="display:none;">
                <label for="uim-group-select" style="display:block; margin-top:0.7em;">Import into Group</label>
                <select id="uim-group-select" style="margin-top:0.3em; margin-bottom:0.5em; width:100%;"></select>
                <div id="uim-new-group-row" style="display:none; flex-direction:column; margin-bottom:0.5em;">
                    <label for="uim-new-group-name">New Group Name:</label>
                    <input type="text" id="uim-new-group-name" placeholder="e.g., Marketing" style="margin-top:0.3em;">
                </div>
            </div>
            <div id="uim-file-error" style="margin-bottom:0.5em; display:none; color:#ef4444; background:#fffbe6; border-radius:6px; padding:0.4em 0.8em;"></div>
            <div class="modal-btn-bar" style="display:flex; justify-content:flex-end; gap:0.7em; margin-top:1em;">
                <button type="button" class="btn btn-text" id="uim-file-cancel">Cancel</button>
                <button type="button" class="btn btn-primary" id="uim-file-confirm">Import</button>
            </div>
        </div>

        <div id="uim-cancel-bar" class="modal-btn-bar" style="display:flex; justify-content:flex-end; margin-top:0.75em;">
            <button type="button" class="btn btn-text" id="new-prompt-cancel">Cancel</button>
        </div>

    </div>
</div>

<!-- Delete Prompt Confirmation Modal -->
<div id="delete-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:2rem; border-radius:8px; max-width:90vw; max-height:90vh; box-shadow:0 4px 16px rgba(0,0,0,0.2); text-align:center;">
        <h2>Delete Prompt?</h2>
        <p>This action cannot be undone. Are you sure you want to delete this prompt?</p>
        <div style="margin-top:1.5rem; display:flex; gap:1rem; justify-content:center;">
            <button id="confirm-delete-prompt" class="btn btn-danger">Delete</button>
            <button id="cancel-delete-prompt" class="btn btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<!-- Copy Confirmation Modal -->
<div id="copy-modal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; padding:2rem; border-radius:8px; max-width:90vw; max-height:90vh; box-shadow:0 4px 16px rgba(0,0,0,0.2); text-align:center;">
        <h2>Prompt Copied!</h2>
        <p>The generated prompt has been copied to your clipboard.<br>Go to your AI tool and paste the prompt to use it.</p>
        <button id="close-copy-modal" class="btn btn-primary" style="margin-top:1rem;">OK</button>
    </div>
</div>
