<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Builder Pro</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/screens.css">
</head>
<body>

<div id="container">
    <!-- #include "html/app-bar.html" -->
    <!-- #include "html/sidebar.html" -->

    <div id="main-content" style="margin-left:260px;">
        <div class="main-panel">

            <section id="welcome-screen" class="screen active">
                <div class="empty-state">
                    <h3>Welcome to Prompt Builder Pro</h3>
                    <p>Select a prompt from the sidebar or create a new one</p>
                </div>
            </section>

            <div id="info-display" class="info-display card card-body" style="margin-bottom: 1.5rem;">
                <h3 id="view-name" style="margin-bottom: 0.5rem; color: var(--color-primary); font-size: 1.5em;">Prompt Name</h3>
                <p id="view-desc" style="font-size: 1.1em; color: var(--color-text-muted); margin-bottom: 0.5rem;">Description</p>
                <details id="view-meta-details" style="margin-bottom: 0.5rem;">
                    <summary style="cursor:pointer; color: var(--color-primary); font-weight: 500; font-size: 1.05em;">Show Details</summary>
                    <div id="view-meta" style="display: flex; flex-direction: column; gap: 0.7em; padding: 0.7em 0 0 0.2em; line-height: 1.6;"></div>
                </details>
            </div>

            <div id="tabs">
                <button id="tab-view">Use Template</button>
                <button id="tab-edit">Edit Template</button>
                <button id="tab-history">Template History</button>
                <button id="tab-output">Output</button>
            </div>

            <div class="tab-content">
                <!-- #include "html/screens/view-screen.html" -->
                <!-- #include "html/screens/output-screen.html" -->
                <!-- #include "html/screens/history-screen.html" -->
                <!-- #include "html/screens/edit-screen.html" -->
            </div>

        </div>

        <!-- #include "html/modals/prompt-modals.html" -->
        <!-- #include "html/modals/import-export-modals.html" -->
    </div>
</div>

<footer id="app-footer">
    <div id="toast-warning" class="toast-warning">
        <span>Warning: Your data is stored in your browser and may be lost if you clear your cache or use a different device.</span>
    </div>
</footer>

<!-- #include "html/modals/workspace-modals.html" -->
<!-- #include "html/modals/template-group-modals.html" -->

<!-- Hidden file inputs for import operations -->
<input type="file" id="import-file" accept=".json" style="display:none">
<input type="file" id="load-workspace-file" accept=".json" style="display:none">
<input type="file" id="load-template-group-file" accept=".json" style="display:none">

<script>
    window.addEventListener('beforeunload', function (e) {
        if (window.promptUnsavedChanges) {
            e.preventDefault();
            e.returnValue = '';
        }
    });
</script>
<script src="js/utils.js"></script>
<script src="js/editPrompt.js"></script>
<script src="js/storageManager.js"></script>
<script src="js/preloadedPrompts.js"></script>
<script src="js/newApp.js"></script>

</body>
</html>
